<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pagina Sandbox</title>
    <link rel="stylesheet" href="../assets/css/style-sandbox.css">
</head>
<body>
    <div class="container-sandbox">
        <h1>Pagina Sandbox</h1>
    </div>
        <div class="p-sand">
            <p>dedicada a testes e experimentos. Aqui, podemos explorar novas ideias,
                testar funcionalidades e experimentar com diferentes abordagens sem

<!--Div para manipular ambos os imports -->
<div class="container-sandbody">
    <audio preload="metadata" controls autoplay loop muted>
        <source src="../assets/audio/library.mp3" type="audio/mpeg">
        <p> Seu navegador não suporta o elemento de áudio.</p>
    </audio>
    <iframe
            width="560"
            height="315"
            src="https://www.youtube.com/embed/RUsUQ9tRHHQ?si=op3vY0Ry6FAH70YL"
            title="YouTube video player"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</div>
